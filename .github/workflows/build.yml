name: TAI Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven

      - name: Setup Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: "stable"

      - name: Compile Nim Hexdump
        run: |
          mkdir -p src/main/resources/bin
          nim c -o:src/main/resources/bin/nim_hexdump -d:release src/main/nim/nim_hexdump.nim

      - name: Build with Maven
        run: mvn -B package --file pom.xml
        #env:
        #ROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Run Tests
        run: mvn test
        #env:
        #GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TAI-Editor-Jar
          path: target/*.jar
